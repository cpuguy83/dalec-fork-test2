name: Build Worker Images

on:
  push:
    branches:
      - main
      - 'releases/*'
  release:
    types:
      - published
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/worker-images/matrix.json'
      - '.github/workflows/worker-images.yml'
  workflow_dispatch:
    inputs:
      make_latest:
        description: 'Whether to also tag images as latest (true/false). Empty = infer from the published release.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  load-matrix:
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    runs-on: ubuntu-22.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses:  actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set matrix
        id: set-matrix
        run: |
          MATRIX=$(cat .github/workflows/worker-images/matrix.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-worker-images:
    permissions:
      contents: write  # Required to upload the digest manifest to the release
      packages: write
      id-token: write  # Required for cosign OIDC signing
      attestations: write  # Required for GitHub attestations
      artifact-metadata: write # Required for certain parts of GitHub attestations (actions/attest complains if not set)
    needs: load-matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            fulcio.sigstore.dev:443
            ghcr.io:443
            github.com:443
            *.githubusercontent.com:443
            proxy.golang.org:443
            rekor.sigstore.dev:443
            storage.googleapis.com:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Cosign
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.1

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        name: Login to GHCR
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/enable-containerd
      
      - name: Setup environment
        run: |
          echo MAIN_CACHE_SCOPE=main.${{ matrix.target }} >> $GITHUB_ENV

          tag="${{ github.ref_name }}"
          tag="${tag//\//-}" # Replace slashes with dashes
          tag="${tag%.*}" # Trim off patch version if it exists

          # Format repository name (lowercase)
          FORMATTED_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          BASE_REPO="${FORMATTED_REPO}/${{ matrix.target }}"
          echo "BASE_REPO=${BASE_REPO}" >> $GITHUB_ENV
          echo "IMAGE_REPO=${BASE_REPO}:${tag}" >> $GITHUB_ENV
      - if: ${{ github.event_name == 'pull_request' }}
        name: Setup up (PR)
        run: |
          set -eux
          # Here we try to build this as much like a release as possible, but we push to a local registry

          ref="localhost:5000/${IMAGE_REPO}"
          EXTRA_FLAGS="--set worker.cache-from=type=gha,scope=${MAIN_CACHE_SCOPE} --set worker.tags=${ref} --push"

          # Because we sometimes add an extra ref for ":latest", let's also do that here to validate that it works
          EXTRA_FLAGS+=" --set worker.tags=${ref}-latest"

          echo "EXTRA_FLAGS=${EXTRA_FLAGS}" >> $GITHUB_ENV

          # Format repository name (lowercase) for registry mirror
          FORMATTED_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker run -d --net=host ghcr.io/${FORMATTED_REPO}/mirror/dockerhub/library/registry:latest
      - if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        name: Setup (release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux

          ref="ghcr.io/${IMAGE_REPO}"

   
          # Don't need to care about cache-from in this case as this is the "prod" image, better to build it from scratch
          # Inline the cache with the image so others can use it as a cache-from for their own builds.
          EXTRA_FLAGS="--set worker.cache-to=type=inline,mode=max --set worker.tags=${ref} --push"

          latest="$(gh release view --json tagName -q .tagName || echo '')"
          MAKE_LATEST="${{ inputs.make_latest }}"
          if [ -n "$MAKE_LATEST" ]; then
            IS_LATEST="$MAKE_LATEST"
          elif [ "${{ github.ref_name }}" = "${latest}" ]; then
            IS_LATEST=true
          else
            IS_LATEST=false
          fi
          echo "IS_LATEST=${IS_LATEST}" >> $GITHUB_ENV
          if [ "${IS_LATEST}" = "true" ]; then
            # If this is the latest release, we also tag it as "latest"
            IMAGE_REPO_LATEST="${BASE_REPO}:latest"
            EXTRA_FLAGS+=" --set worker.tags=ghcr.io/${IMAGE_REPO_LATEST}"
          fi

          echo "EXTRA_FLAGS=${EXTRA_FLAGS}" >> $GITHUB_ENV
      - if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') }}
        name: Setup (merged)
        run: |
          set -ex -o pipefail
          EXTRA_FLAGS="--set worker.cache-to=type=gha,scope=main.${{matrix.target}},mode=max --set worker.cache-from=type=gha,scope=${MAIN_CACHE_SCOPE}"
          echo "EXTRA_FLAGS=${EXTRA_FLAGS}" >> $GITHUB_ENV
      - name: Setup QEMU
        run: |
          set -eu -o pipefail

          # Pinned by digest for reproducibility and signed-supply-chain hygiene.
          # Pulled from our GHCR mirror first because Docker Hub egress on hosted
          # runners intermittently times out and would otherwise fail the
          # release; Docker Hub stays as a fallback. Seed the mirror once per
          # owner with the "Mirror binfmt to GHCR" workflow (mirror-binfmt.yml).
          # The digest MUST match the one in mirror-binfmt.yml.
          digest="sha256:d3b963f787999e6c0219a48dba02978769286ff61a5f4d26245cb6a6e5567ea3"
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          images="ghcr.io/${owner}/binfmt@${digest} docker.io/tonistiigi/binfmt:latest@${digest}"

          for image in $images; do
            for attempt in 1 2 3; do
              if docker run --rm --privileged "$image" --install all; then
                exit 0
              fi
              echo "QEMU/binfmt setup via ${image} attempt ${attempt} failed; retrying in $((attempt * 10))s..." >&2
              sleep "$((attempt * 10))"
            done
            echo "QEMU/binfmt setup via ${image} failed after 3 attempts; trying next source." >&2
          done
          echo "QEMU/binfmt setup failed for all sources." >&2
          exit 1
      - name: Expose GitHub tokens for caching
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      - name: Build worker images
        run: |
          set -eux

          docker buildx bake worker \
            --set worker.platform=linux/amd64,linux/arm64 \
            ${EXTRA_FLAGS}
        env:
          WORKER_TARGET: ${{ matrix.target }}
      
      - name: Sign and attest worker images
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        id: sign
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          
          ref="ghcr.io/${IMAGE_REPO}"
          
          # Get the digest of the pushed image
          DIGEST=$(docker buildx imagetools inspect ${ref} --format '{{json .Manifest.Digest}}' | tr -d '"')
          
          # Sign the image
          cosign sign --yes "${ref}@${DIGEST}"
          
          # Verify the signature
          cosign verify "${ref}@${DIGEST}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/worker-images.yml@${{ github.ref }}"
          
          # If this is the latest release, sign that tag too. IS_LATEST is
          # computed in the build step above.
          if [ "${IS_LATEST:-false}" = "true" ]; then
            IMAGE_REPO_LATEST="${BASE_REPO}:latest"
            ref_latest="ghcr.io/${IMAGE_REPO_LATEST}"
            cosign sign --yes "${ref_latest}@${DIGEST}"
          fi
          
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "image-name=ghcr.io/${BASE_REPO}" >> $GITHUB_OUTPUT
      - name: Attest build provenance
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2.0.0
        with:
          subject-name: ${{ steps.sign.outputs.image-name }}
          subject-digest: ${{ steps.sign.outputs.digest }}
          push-to-registry: true

      - name: Attach digest manifest to release
        if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
          IMAGE: ${{ steps.sign.outputs.image-name }}
          DIGEST: ${{ steps.sign.outputs.digest }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          # Only record provenance when this build corresponds to a release tag.
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
            echo "No release for ${REF_NAME}; skipping digest manifest upload."
            exit 0
          fi

          manifest="${TARGET//\//-}.digest.json"
          jq -n \
            --arg image "$IMAGE" \
            --arg digest "$DIGEST" \
            --arg target "$TARGET" \
            '{image: $image, digest: $digest, target: $target}' \
            > "$manifest"

          # Sign the digest manifest so the release-to-digest mapping is
          # verifiable, not just an unauthenticated pointer.
          cosign sign-blob --yes \
            --bundle "${manifest}.cosign.bundle" \
            "$manifest"

          gh release upload "$REF_NAME" "$manifest" "${manifest}.cosign.bundle" --clobber
        shell: bash
