name: Release

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      make_latest:
        description: 'Whether to also tag images as latest (true/false). Empty = infer from the published release.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  tagList:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.tags.outputs.OUTPUT_TAGS }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Get image tag list
        id: tags
        run: |
          set -eux -o pipefail

          if [ "$GITHUB_EVENT_NAME" != "release" ] && [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            echo "This workflow must be dispatched against a release tag." >&2
            exit 1
          fi

          # Remove leading "v" from tag name
          TRIMMED_REF_NAME="${REF_NAME#v}"

          OUTPUT_TAGS=(
            "type=raw,value=${TRIMMED_REF_NAME%.*}"
            "type=raw,value=${TRIMMED_REF_NAME}"
          )

          # Check if this tag is the latest release. When dispatched by
          # create-release the decision is passed explicitly (the release is
          # still a draft at this point); otherwise infer it from the latest
          # published release.
          MAKE_LATEST="${{ inputs.make_latest }}"
          if [ -n "$MAKE_LATEST" ]; then
            IS_LATEST="$MAKE_LATEST"
          elif [ "$(gh release view --json tagName -q .tagName)" = "$REF_NAME" ]; then
            IS_LATEST=true
          else
            IS_LATEST=false
          fi
          if [ "$IS_LATEST" = "true" ]; then
            OUTPUT_TAGS=("type=raw,value=latest" "${OUTPUT_TAGS[@]}")
          fi

          {
            echo "OUTPUT_TAGS<<EOF"
            printf '%s\n' "${OUTPUT_TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"
        env:
          REF_NAME: ${{ github.event.release.tag_name || github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        shell: bash

  build:
    permissions:
      contents: write  # Required to upload the digest manifest to the release
      packages: write
      id-token: write  # Required for cosign OIDC signing
      attestations: write  # Required for GitHub attestations
      artifact-metadata: write # Must be granted here so the called workflow can request it

    needs: tagList
    uses: ./.github/workflows/frontend-image.yml
    with:
      tag: ${{needs.tagList.outputs.tags}}
