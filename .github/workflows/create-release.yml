name: Create Release

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - '.github/releases/*.md'
  workflow_dispatch:
    inputs:
      release_file:
        description: 'Release request file to process, for example .github/releases/v0.20.0.md'
        required: true
        type: string

permissions:
  actions: write
  contents: write
  id-token: write

concurrency:
  group: create-release-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.release_file || github.sha }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            fulcio.sigstore.dev:443
            github.com:443
            *.githubusercontent.com:443
            oauth2.sigstore.dev:443
            proxy.golang.org:443
            rekor.sigstore.dev:443
            storage.googleapis.com:443
            sum.golang.org:443
            token.actions.githubusercontent.com:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout release request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
          cache: false

      - name: Install gitsign
        run: |
          set -eux -o pipefail

          go install github.com/sigstore/gitsign@v0.15.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
        shell: bash

      - name: Read release request
        id: release
        env:
          RELEASE_FILE_INPUT: ${{ inputs.release_file }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          case "$GITHUB_REF" in
            refs/heads/main|refs/heads/release/*) ;;
            *)
              echo "Run this workflow from main or release/** so release tag signatures have a stable identity." >&2
              exit 1
              ;;
          esac

          release_file="$RELEASE_FILE_INPUT"
          if [ -z "$release_file" ]; then
            if [[ "$PUSH_BEFORE" =~ ^0+$ ]]; then
              mapfile -t release_files < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" -- '.github/releases/*.md')
            else
              mapfile -t release_files < <(git diff --name-only --diff-filter=AM "$PUSH_BEFORE" "$GITHUB_SHA" -- '.github/releases/*.md')
            fi

            if [ "${#release_files[@]}" -ne 1 ]; then
              echo "Expected exactly one added or modified release request, found ${#release_files[@]}." >&2
              printf '%s\n' "${release_files[@]}" >&2
              exit 1
            fi

            release_file="${release_files[0]}"
          fi

          case "$release_file" in
            .github/releases/*.md) ;;
            *)
              echo "Release request must be a .github/releases/*.md file." >&2
              exit 1
              ;;
          esac

          if [ ! -f "$release_file" ]; then
            echo "Release request file ${release_file} does not exist." >&2
            exit 1
          fi

          release_outputs="$(go run ./cmd/release-request --notes-file release-notes.md "$release_file")"
          echo "$release_outputs" >> "$GITHUB_OUTPUT"

          tag_name="$(sed -n 's/^tag=//p' <<<"$release_outputs")"
          target="$(sed -n 's/^target=//p' <<<"$release_outputs")"

          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH with an optional prerelease suffix." >&2
            exit 1
          fi

          if [ "$GITHUB_REF" = "refs/heads/main" ] && [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.0(-|$) ]]; then
            echo "Patch releases should be prepared on their release/** branch, not main." >&2
            exit 1
          fi

          if [ "$release_file" != ".github/releases/${tag_name}.md" ]; then
            echo "Release request filename must match .github/releases/${tag_name}.md." >&2
            exit 1
          fi

          notes_start_tag="$(sed -n 's/^notes_start_tag=//p' <<<"$release_outputs")"
          if [ -n "$notes_start_tag" ] && [[ ! "$notes_start_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "notes_start_tag must match vMAJOR.MINOR.PATCH with an optional prerelease suffix." >&2
            exit 1
          fi

          if [[ ! "$target" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Release target must be a full 40-character commit SHA." >&2
            exit 1
          fi

          target_sha="$(git rev-parse "${target}^{commit}")"
          if [ "${target_sha,,}" != "${target,,}" ]; then
            echo "Release target must name a commit directly." >&2
            exit 1
          fi

          if ! git merge-base --is-ancestor "$target_sha" "$GITHUB_SHA"; then
            echo "Release target ${target_sha} must be reachable from ${GITHUB_REF#refs/heads/} at ${GITHUB_SHA}." >&2
            exit 1
          fi

          {
            echo "target=${target_sha}"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create signed tag
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/create-release.yml@${{ github.ref }}
          GH_TOKEN: ${{ github.token }}
          GITSIGN_TOKEN_PROVIDER: github-actions
          TAG_NAME: ${{ steps.release.outputs.tag }}
          TARGET_SHA: ${{ steps.release.outputs.target }}
          RELEASE_NOTES_FILE: ${{ steps.release.outputs.release_notes_file }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
            actual_target="$(git rev-list -n1 "$TAG_NAME")"
            if [ "$actual_target" != "$TARGET_SHA" ]; then
              echo "Tag ${TAG_NAME} already points to ${actual_target}, not ${TARGET_SHA}." >&2
              exit 1
            fi

            gitsign verify-tag \
              --certificate-identity="$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
              "$TAG_NAME"
            exit 0
          fi

          git config user.name "Dalec Release Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config gpg.x509.program gitsign
          git config gpg.format x509
          git config tag.gpgsign true

          # Annotate the tag with the curated release notes so the signed tag is
          # self-describing. The subject line is the release title; the body, if
          # the request supplied one, follows after a blank line.
          tag_message_file="$(mktemp)"
          printf 'Dalec %s\n' "$TAG_NAME" > "$tag_message_file"
          if [ -n "${RELEASE_NOTES_FILE:-}" ] && [ -s "$RELEASE_NOTES_FILE" ]; then
            printf '\n' >> "$tag_message_file"
            cat "$RELEASE_NOTES_FILE" >> "$tag_message_file"
          fi

          git tag -s "$TAG_NAME" "$TARGET_SHA" -F "$tag_message_file"

          gitsign verify-tag \
            --certificate-identity="$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "$TAG_NAME"

          git push origin "refs/tags/${TAG_NAME}"
        shell: bash

      - name: Create release and publish images
        env:
          GH_TOKEN: ${{ github.token }}
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/create-release.yml@${{ github.ref }}
          IMAGE_REPO: ${{ github.repository }}
          NOTES_START_TAG: ${{ steps.release.outputs.notes_start_tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
          RELEASE_NOTES_FILE: ${{ steps.release.outputs.release_notes_file }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists."
          else
            notes_file="$(mktemp)"

            # Curated notes from the release request, when present.
            if [ -n "$RELEASE_NOTES_FILE" ]; then
              cat "$RELEASE_NOTES_FILE" >> "$notes_file"
              printf '\n\n' >> "$notes_file"
            fi

            # GitHub's generated changelog.
            generate_args=(-f tag_name="$TAG_NAME")
            if [ -n "$NOTES_START_TAG" ]; then
              generate_args+=(-f previous_tag_name="$NOTES_START_TAG")
            fi
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              "${generate_args[@]}" --jq .body >> "$notes_file"

            # Signature verification instructions. The Git tag is signed by this
            # workflow; the release images are signed under the tag ref by
            # frontend-image.yml, so they use a refs/tags/<tag> identity. The
            # frontend image tag itself drops the leading "v" (e.g. 0.24.0).
            printf '\n' >> "$notes_file"
            image_tag="${TAG_NAME#v}"
            sed \
              -e "s|\${TAG_NAME}|${TAG_NAME}|g" \
              -e "s|\${IMAGE_TAG}|${image_tag}|g" \
              -e "s|\${CERTIFICATE_IDENTITY}|${CERTIFICATE_IDENTITY}|g" \
              -e "s|\${IMAGE_REPO}|${IMAGE_REPO}|g" \
              "${GITHUB_WORKSPACE}/.github/release-notes/verification.md.tmpl" >> "$notes_file"

            args=(
              "$TAG_NAME"
              --verify-tag
              --title "$TAG_NAME"
              --notes-file "$notes_file"
              --draft
            )

            if [ "$PRERELEASE" = "true" ]; then
              args+=(--prerelease)
            fi

            # Create the release as a draft so the image builds can attach their
            # signed digest manifests to it. Immutable releases reject asset
            # uploads once published, so we publish only after the builds finish.
            gh release create "${args[@]}"
          fi

          # Non-prerelease releases become "latest". The image builds normally
          # infer this from the published release, but our release is still a
          # draft while they run, so pass the decision explicitly.
          if [ "$PRERELEASE" = "true" ]; then
            make_latest=false
          else
            make_latest=true
          fi

          # Build and publish the release images, then BLOCK until they finish so
          # this release run only succeeds once the signed images exist. Each
          # build uploads its own *.digest.json asset to the release.
          #
          # This is idempotent: if a run for the tag already succeeded or is
          # in flight (e.g. on a re-run after a transient runner failure), it is
          # reused instead of dispatching a redundant rebuild.
          dispatch_and_capture() {
            local wf="$1" before id
            before="$(date -u -d '-1 minute' +%Y-%m-%dT%H:%M:%SZ)"
            gh workflow run "$wf" --ref "$TAG_NAME" -f make_latest="$make_latest" >&2

            id=""
            for _ in $(seq 1 30); do
              id="$(gh run list --workflow "$wf" --event workflow_dispatch \
                --json databaseId,headBranch,createdAt \
                --jq "[.[] | select(.headBranch==\"${TAG_NAME}\" and .createdAt >= \"${before}\")] | sort_by(.createdAt) | last | .databaseId" 2>/dev/null || true)"
              if [ -n "$id" ] && [ "$id" != "null" ]; then
                break
              fi
              id=""
              sleep 5
            done

            if [ -z "$id" ]; then
              echo "Could not find a dispatched run for ${wf} on ${TAG_NAME}." >&2
              return 1
            fi
            echo "$id"
          }

          # Reuse an existing successful or in-flight run for the tag, else
          # dispatch a new one; then block until it finishes.
          ensure_built() {
            local wf="$1" id
            id="$(gh run list --workflow "$wf" --branch "$TAG_NAME" --event workflow_dispatch \
              --json databaseId,status,conclusion,createdAt \
              --jq '[.[] | select(.conclusion == "success" or .status == "in_progress" or .status == "queued")] | sort_by(.createdAt) | last | .databaseId' 2>/dev/null || true)"

            if [ -z "$id" ] || [ "$id" = "null" ]; then
              id="$(dispatch_and_capture "$wf")"
            else
              echo "Reusing existing ${wf} run ${id} for ${TAG_NAME}." >&2
            fi

            echo "Waiting for ${wf} run ${id} ..."
            gh run watch "$id" --exit-status --interval 20
          }

          rc=0
          ensure_built release.yml || rc=1
          ensure_built worker-images.yml || rc=1

          if [ "$rc" -ne 0 ]; then
            echo "One or more image builds failed; see the runs above." >&2
            echo "The release remains an unpublished draft." >&2
            exit 1
          fi

          # All signed images and their digest manifests are attached to the
          # draft. Publish it now, which locks it immutably with the assets in
          # place. Using GITHUB_TOKEN here does not re-trigger the build
          # workflows.
          if [ "$(gh release view "$TAG_NAME" --json isDraft -q .isDraft)" = "true" ]; then
            publish_args=("$TAG_NAME" --draft=false)
            if [ "$PRERELEASE" = "true" ]; then
              publish_args+=(--prerelease --latest=false)
            else
              publish_args+=(--latest=true)
            fi
            gh release edit "${publish_args[@]}"
          fi
        shell: bash
